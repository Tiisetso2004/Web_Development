<!DOCTYPE html>
<html>

<body>
    <button id="button">click me</button>
    <script>
        //this declares a button
        const myButton = document.querySelector("#button");
        
        //add an EventListener and tigger a function to execute upon trigger
        myButton.addEventListener("click", function() {
            alert("My first JavaScript, executed successfully");
        });
    </script>
</body>

</html>
